<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcript</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="panel-container">
    <!-- Header: Video Info -->
    <header class="video-header" id="video-header" hidden>
      <div class="header-label">Currently reading:</div>
      <h2 class="video-title" id="video-title">...</h2>
      <div class="video-channel" id="video-channel"></div>
      <div class="transcript-meta">
        <span id="transcript-status">Transcript: Auto-generated English</span>
        <select id="language-select" class="language-select" hidden></select>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" hidden>
      <div class="search-container">
        <input type="search" id="search-input" placeholder="Search transcript... (Ctrl+F)">
      </div>
      <div class="actions-container">
        <button id="btn-copy" class="action-btn" title="Copy transcript">Copy</button>
        <div class="download-dropdown">
          <button id="btn-download" class="action-btn" title="Download">Download ▾</button>
          <div class="dropdown-menu">
            <button class="dropdown-item" data-format="txt">TXT</button>
            <button class="dropdown-item" data-format="md">Markdown</button>
            <button class="dropdown-item" data-format="srt">SRT</button>
            <button class="dropdown-item" data-format="vtt">VTT</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty States -->
    <div class="empty-state" id="state-not-youtube">
      <div class="empty-state-icon">📺</div>
      <div class="empty-state-text">Open a YouTube video to see its transcript here.</div>
    </div>
    
    <div class="empty-state" id="state-loading" hidden>
      <div class="spinner"></div>
      <div class="empty-state-text">Loading transcript...</div>
    </div>

    <div class="empty-state" id="state-no-transcript" hidden>
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-text">No transcript available for this video.</div>
    </div>

    <div class="empty-state" id="state-error" hidden>
      <div class="empty-state-icon">⚠️</div>
      <div class="empty-state-text" id="error-message">Failed to load transcript.</div>
      <button id="btn-retry" class="action-btn primary">Retry</button>
    </div>

    <!-- Transcript Rows -->
    <div class="transcript-container" id="transcript-container" hidden>
      <!-- Rows will be injected here -->
    </div>
  </div>

  <script src="../utils/youtube.js"></script>
  <script src="../utils/page-support.js"></script>
  <script src="../utils/export.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
